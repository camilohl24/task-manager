<div
  class="bg-gray-950 border border-gray-800 rounded-xl py-2 px-3 flex flex-col gap-3 hover:border-gray-700 transition-colors"
>
  <div class="flex flex-col gap-1">
    <p class="tex-sm font-medium text-white">{{ task.title }}</p>
    <p class="text-xs text-gray-500 leading-relaxed">{{ task.description }}</p>
  </div>

  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div
        class="w-5 h-5 rounded-full bg-blue-950 border border-blue-900 flex items-center justify-center tetx-blue-400 text-xs font-medium"
      >
        {{ task.assignedTo?.charAt(0)?.toLocaleUpperCase() }}
      </div>
      <span class="text-xs text-gray-600">{{ task.assignedTo }}</span>
    </div>
    @if (task.dueDate) {
      <span class="text-xs bg-amber-950 text-amber-500 px-2 py-0.5 rounded-md">
        {{ formatDate(task.dueDate) }}
      </span>
    }
  </div>
  <div class="h-px bg-gray-800"></div>

  <div class="flex flex-col gap-2">
    @if (task.status === 'Pending') {
      <button
        (click)="changeStatus('InProgress')"
        class="w-full text-xs  border border-blue-900 text-blue-400 rounded-lg py-1.5 hover:bg-blue-700 transition-colors"
      >
        → En proceso
      </button>
    }
    @if (task.status === 'InProgress') {
        <div class="grid grid-cols-2 gap-1">
                  <button
        (click)="changeStatus('Pending')"
        class="w-full text-xs  border border-amber-900 text-amber-400 rounded-lg py-1.5 hover:bg-amber-700 transition-colors"
      >
        ← Pendiente
      </button>
      <button
        (click)="changeStatus('Done')"
        class="w-full text-xs border border-green-900 text-green-400 rounded-lg py-1.5 hover:bg-green-700 transition-colors"
      >
        → Completado
      </button>
        </div>

    }
    @if (task.status === 'Done') {
      <button
        (click)="changeStatus('InProgress')"
        class="w-full text-xs border border-blue-900 text-blue-400 rounded-lg py-1.5 hover:bg-blue-700 transition-colors"
      >
        ← En proceso
      </button>
    }
  </div>

  <div class="flex gap-2">
    <button
      (click)="edit()"
      class="flex-1 text-xs border border-gray-800 text-gray-500 rounded-lg py-1.5 hover:bg-gray-800 hover:text-gray-300 transition-colors"
    >
      <i class="ti ti-edit" style="font-size: 13px" aria-hidden="true"></i> Editar
    </button>
    <button
      (click)="delete()"
      class="w-8 border border-red-950 text-gray-600 rounded-lg hover:bg-red-950 hover:text-red-400 transition-colors flex items-center justify-center"
    >
      <i class="ti ti-trash" style="font-size: 13px" aria-hidden="true"></i>
    </button>
  </div>
</div>
